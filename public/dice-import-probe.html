<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Dice Import Probe</title>
  </head>
  <body>
    <pre id="result">pending</pre>
    <script type="module">
      const result = document.getElementById('result')
      const events = []
      window.addEventListener('error', (event) => {
        events.push({
          kind: 'error',
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          error: String(event.error?.stack || event.error || ''),
        })
      })
      window.addEventListener('unhandledrejection', (event) => {
        events.push({
          kind: 'unhandledrejection',
          reason: String(event.reason?.stack || event.reason || ''),
        })
      })
      const params = new URLSearchParams(window.location.search)
      const target = params.get('target') || '/vendor/dice-box/world.onscreen.min.js'
      try {
        const mod = await import(target)
        result.textContent = JSON.stringify({ ok: true, keys: Object.keys(mod).slice(0, 20), events })
      } catch (error) {
        await new Promise((resolve) => setTimeout(resolve, 500))
        result.textContent = JSON.stringify({
          ok: false,
          name: error?.name,
          message: error?.message,
          stack: String(error?.stack || '').slice(0, 2000),
          events,
        })
      }
    </script>
  </body>
</html>
